[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "honker"
version = "0.1.0"
description = "Durable queue, stream, and cross-process pub/sub for SQLite. Built on honker."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Russell Romney" }]
keywords = ["sqlite", "queue", "pubsub", "stream", "outbox", "notify", "listen"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Database",
  "Topic :: System :: Distributed Computing",
]
dependencies = [
  # honker-core is loaded as a dynamic library; no pip dep needed.
  # The Rust cdylib (built via maturin) IS the honker package.
]

[project.urls]
Homepage = "https://github.com/russellromney/honker"
Repository = "https://github.com/russellromney/honker"

[tool.setuptools]
packages = ["honker"]
package-dir = { "honker" = "." }
